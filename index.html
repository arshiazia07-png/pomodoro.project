<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>
<nav class="top-navbar">
  <div class="nav-left">
    <div class="logo-container">
      <div class="checkmark">
        <i class="fa-solid fa-circle-check"></i>
      </div>
      <h1 class="logo">Pomodoro</h1>
      </div>
  </div>
  <div class="nav-right">
    <a href="#" class="nav-link report">Report
        <i class="fa-solid fa-chart-column"></i>
    </a>
    
    <a href="#" class="nav-link sign-in">Sign in
        <i class="fa-solid fa-circle-user"></i>
    </a>

    <a href="#" class="nav-link setting">Setting
       <i class="fa-solid fa-gear"></i>
    </a>
    
  </div>
</nav>
    <div class="container">
        <h1 class="title">Pomodoro Timer </h1>
        <hr>
        <p class= "timer"id="timer">25:00</p>

        <div class="button-wrapper">
    <button id="start">Start</button>
    <button id="stop">Stop</button>
    <button id="reset">Reset</button>
        </div>
    <div> 
        <div class="navbar">
    </div>
    <div class="main-container">
    </div>
  <div class="tasks-wrapper">
    <div class="status-info">
      <div class="count">#1</div>
      <div class="message">Time to focus!</div>
    </div>
    <div class="task-header">
      <span>Tasks</span>
      <button class="dots-btn">⋮</button>
    </div>
    <hr class="task-line">

    <button class="add-task-container">
      <span class="plus">+</span> Add Task
    </button>
  </div>

  
    <script src="app.js"></script>
</body>
</html>
